name: 全自动前后端一体化部署

on:
  push:
    branches: [ main ]

jobs:
  # =========================================================
  # 1. 管理端 (vue--cms) 构建与版本化部署 (81端口)
  # =========================================================
  deploy-admin:
    runs-on: self-hosted
    steps:
      - name: Native Git Checkout (SSH)
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          find . -mindepth 1 -delete 2>/dev/null || true
          git clone --depth 1 -b main git@github.com:Xu-ZHilin/Allcms.git .

      - name: MD5 Change Detection (Admin)
        id: filter_admin
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          CACHE_DIR="/tmp/admin_deploy_cache"
          sudo mkdir -p $CACHE_DIR && sudo chown -R $(whoami):$(whoami) $CACHE_DIR
          OLD_FINGERPRINT="$CACHE_DIR/last_admin_md5.txt"
          CURRENT_FINGERPRINT=$(find vue--cms/src/ vue--cms/public/ vue--cms/package.json -type f 2>/dev/null | sort | xargs md5sum 2>/dev/null | md5sum | cut -d' ' -f1)
          NEED_BUILD="false"
          if [ ! -f "$OLD_FINGERPRINT" ] || [ "$CURRENT_FINGERPRINT" != "$(cat $OLD_FINGERPRINT 2>/dev/null)" ]; then
              NEED_BUILD="true"
          fi
          echo "$CURRENT_FINGERPRINT" > "$OLD_FINGERPRINT" || true
          echo "code_changed=$NEED_BUILD" >> $GITHUB_OUTPUT

      - name: Build Admin
        if: steps.filter_admin.outputs.code_changed == 'true'
        run: |
          cd vue--cms && npm install --registry=https://registry.npmmirror.com && npm run build

      - name: Deploy Admin (版本化发布)
        if: steps.filter_admin.outputs.code_changed == 'true'
        run: |
          VUE_RELEASE_DIR="/app/cms/releases/admin/${{ github.sha }}"
          sudo mkdir -p $VUE_RELEASE_DIR && sudo cp -r vue--cms/dist/* $VUE_RELEASE_DIR/
          sudo rm -rf /app/cms/web/admin && sudo ln -snf $VUE_RELEASE_DIR /app/cms/web/admin
          sudo chown -R www-data:www-data /app/cms/web/admin
          cd /app/cms/releases/admin && ls -t | tail -n +6 | sudo xargs rm -rf 2>/dev/null || true

  # =========================================================
  # 2. 客户端 (vue-dept7) 构建与版本化部署 (82端口)
  # =========================================================
  deploy-client:
    runs-on: self-hosted
    needs: deploy-admin
    steps:
      - name: Native Git Checkout (SSH)
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          find . -mindepth 1 -delete 2>/dev/null || true
          git clone --depth 1 -b main git@github.com:Xu-ZHilin/Allcms.git .

      - name: MD5 Change Detection (Client)
        id: filter_client
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          CACHE_DIR="/tmp/client_deploy_cache"
          sudo mkdir -p $CACHE_DIR && sudo chown -R $(whoami):$(whoami) $CACHE_DIR
          OLD_FINGERPRINT="$CACHE_DIR/last_client_md5.txt"
          CURRENT_FINGERPRINT=$(find vue-dept7/src/ vue-dept7/public/ vue-dept7/package.json -type f 2>/dev/null | sort | xargs md5sum 2>/dev/null | md5sum | cut -d' ' -f1)
          NEED_BUILD="false"
          if [ ! -f "$OLD_FINGERPRINT" ] || [ "$CURRENT_FINGERPRINT" != "$(cat $OLD_FINGERPRINT 2>/dev/null)" ]; then
              NEED_BUILD="true"
          fi
          echo "$CURRENT_FINGERPRINT" > "$OLD_FINGERPRINT" || true
          echo "code_changed=$NEED_BUILD" >> $GITHUB_OUTPUT

      - name: Build Client
        if: steps.filter_client.outputs.code_changed == 'true'
        run: |
          cd vue-dept7 && npm install --registry=https://registry.npmmirror.com && npm run build

      - name: Deploy Client (版本化发布)
        if: steps.filter_client.outputs.code_changed == 'true'
        run: |
          VUE_RELEASE_DIR="/app/cms/releases/client/${{ github.sha }}"
          sudo mkdir -p $VUE_RELEASE_DIR && sudo cp -r vue-dept7/dist/* $VUE_RELEASE_DIR/
          sudo rm -rf /app/cms/web/client && sudo ln -snf $VUE_RELEASE_DIR /app/cms/web/client
          sudo chown -R www-data:www-data /app/cms/web/client
          cd /app/cms/releases/client && ls -t | tail -n +6 | sudo xargs rm -rf 2>/dev/null || true

  # =========================================================
  # 3. 后端 (Spring Boot) 构建与自动部署 (8080端口)
  # =========================================================
  deploy-backend:
    runs-on: self-hosted
    needs: [deploy-admin, deploy-client]
    steps:
      - name: Native Git Checkout (SSH)
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          find . -mindepth 1 -delete 2>/dev/null || true
          git clone --depth 1 -b main git@github.com:Xu-ZHilin/Allcms.git .

      - name: Build Backend JAR (使用服务器本地 JDK)
        run: |
          # 精确配置你的 Java 和 Maven 路径
          export JAVA_HOME=/opt/jdk-17.0.14
          export M2_HOME=/opt/maven
          export PATH=$JAVA_HOME/bin:$M2_HOME/bin:$PATH
          
          # 编译并跳过测试
          mvn clean package -DskipTests

      - name: Deploy JAR to Server & Restart Service
        run: |
          # 1. 覆盖新的 jar 包到 current.jar
          sudo cp target/*.jar /app/cms/current.jar
          sudo chown root:root /app/cms/current.jar
          
          # 2. 自动重启后端服务，读取 prod 环境和绝对路径配置
          sudo systemctl daemon-reload
          sudo systemctl restart backend.service