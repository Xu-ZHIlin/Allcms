name: Vue-Frontend-CMS

on:
  push:
    branches: [ main ]

jobs:
  deploy-vue:
    runs-on: self-hosted

    steps:
      # =========================================================
      # 1. 拉取代码（保持老师风格）
      # =========================================================
      - name: Checkout Source
        uses: actions/checkout@v4

      # =========================================================
      # 2. 构建 Vue（适配你的 vue--cms）
      # =========================================================
      - name: Build Vue Project
        run: |
          cd vue--cms
          npm install
          npm run build

      # =========================================================
      # 3. 发布 dist（保持老师“发布结构思想”）
      # =========================================================
      - name: Release Dist to Server
        run: |
          VUE_RELEASE_DIR="/app/vue-cms/releases/${{ github.sha }}"
          
          mkdir -p $VUE_RELEASE_DIR
          
          cp -r vue--cms/dist/* $VUE_RELEASE_DIR/

          ln -snf $VUE_RELEASE_DIR /app/vue-cms/current

      # =========================================================
      # 4. Nginx 指向 current（老师核心思想保留）
      # =========================================================
      - name: Update Nginx Link
        run: |
          ln -snf /app/vue-cms/current /var/www/vue-project

      # =========================================================
      # 5. 清理旧版本（老师版本管理逻辑保留）
      # =========================================================
      - name: Clean Old Releases
        run: |
          cd /app/vue-cms/releases
          ls -t | tail -n +6 | xargs rm -rf 2>/dev/null || true