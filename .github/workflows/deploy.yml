name: CMS 全项目部署（后端+管理端+客户端）

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '是否强制重新打包构建?'
        required: true
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 查看目录结构
        run: ls -la

      # ======================
      # 1. 打包后端 Java
      # ======================
      - name: 打包后端（cms2）
        run: |
          export JAVA_HOME=/opt/jdk-17.0.14
          export PATH=$JAVA_HOME/bin:/opt/maven/bin:$PATH
          cd cms2
          mvn clean package -DskipTests

      # ======================
      # 2. 打包管理端 Vue
      # ======================
      - name: 打包管理端（vue--cms）
        run: |
          cd vue--cms
          npm install
          npm run build

      # ======================
      # 3. 部署后端 jar
      # ======================
      - name: 部署后端
        run: |
          export JAVA_HOME=/opt/jdk-17.0.14
          REL_DIR="/app/cms/releases/${{ github.sha }}"
          sudo mkdir -p $REL_DIR
          sudo cp cms2/target/*.jar $REL_DIR/my-cms.jar
          sudo ln -snf $REL_DIR/my-cms.jar /app/cms/current.jar
          cd /app/cms/releases && ls -t | tail -n +6 | xargs sudo rm -rf 2>/dev/null || true
          sudo systemctl restart cms
          sleep 5

      # ======================
      # 4. 部署管理端前端到 Nginx
      # ======================
      - name: 部署管理端前端
        run: |
          sudo rm -rf /usr/share/nginx/html/admin
          sudo cp -r vue--cms/dist /usr/share/nginx/html/admin

      - name: 重启 Nginx
        run: |
          sudo systemctl restart nginx