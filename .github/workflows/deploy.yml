name: Deploy CMS System (Admin, Client & Backend)

on:
  push:
    branches: [ main ]

jobs:
  # =========================================================
  # 1. 管理端 (vue--cms) 构建与部署 (81端口)
  # =========================================================
  deploy-admin:
    runs-on: self-hosted
    steps:
      # 👇 替换为原生 Git 克隆，绕过 HTTPS 网络阻断
      - name: Checkout Source (SSH native git)
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          # 清理当前目录，避免冲突
          find . -mindepth 1 -delete 2>/dev/null || true
          # 使用 SSH 方式克隆（你的旧文件用的就是这个）
          git clone --depth 1 -b main git@github.com:Xu-ZHilin/Allcms.git .

      - name: Build Admin (vue--cms)
        run: |
          cd vue--cms
          npm install
          npm run build

      - name: Deploy Admin to /app/cms/web/admin
        run: |
          sudo rm -rf /app/cms/web/admin/*
          sudo cp -r vue--cms/dist/* /app/cms/web/admin/
          sudo chmod -R 755 /app/cms/web/admin
          sudo chown -R www-data:www-data /app/cms/web/admin

  # =========================================================
  # 2. 客户端 (vue-dept7) 构建与部署 (82端口)
  # =========================================================
  deploy-client:
    runs-on: self-hosted
    steps:
      # 👇 替换为原生 Git 克隆，绕过 HTTPS 网络阻断
      - name: Checkout Source (SSH native git)
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          find . -mindepth 1 -delete 2>/dev/null || true
          git clone --depth 1 -b main git@github.com:Xu-ZHilin/Allcms.git .

      - name: Build Client (vue-dept7)
        run: |
          cd vue-dept7
          npm install
          npm run build

      - name: Deploy Client to /app/cms/web/client
        run: |
          sudo rm -rf /app/cms/web/client/*
          sudo cp -r vue-dept7/dist/* /app/cms/web/client/
          sudo chmod -R 755 /app/cms/web/client
          sudo chown -R www-data:www-data /app/cms/web/client

  # =========================================================
  # 3. 后端 Spring Boot 构建与自动部署 (8080端口)
  # =========================================================
  deploy-backend:
    runs-on: self-hosted
    needs: [deploy-admin, deploy-client]
    steps:
      # 👇 后端也要替换为原生 Git 克隆！
      - name: Checkout Source (SSH native git)
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          find . -mindepth 1 -delete 2>/dev/null || true
          git clone --depth 1 -b main git@github.com:Xu-ZHilin/Allcms.git .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend JAR
        run: mvn clean package -DskipTests

      - name: Deploy JAR to Server & Restart Service
        run: |
          sudo cp target/*.jar /app/cms/current.jar
          sudo chown root:root /app/cms/current.jar
          sudo chmod 755 /app/cms/current.jar
          sudo systemctl restart backend.service