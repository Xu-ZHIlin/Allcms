name: Simple Deploy CMS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ======================
      # 1️⃣ 构建 Vue
      # ======================
      - name: Build Vue Frontend
        run: |
          cd vue--cms
          npm install
          npm run build

      # ======================
      # 2️⃣ 构建 Spring Boot
      # ======================
      - name: Build Backend
        run: |
          cd cms2
          mvn clean package -DskipTests

      # ======================
      # 3️⃣ 上传服务器
      # ======================
      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: |
            vue--cms/dist
            cms2/target/*.jar
          target: /www/cms

      # ======================
      # 4️⃣ 远程启动
      # ======================
      - name: Start Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |

            echo "Stop old backend"
            pkill -f cms2 || true
            pkill -f jar || true

            echo "Start backend"
            cd /www/cms
            mv cms2/target/*.jar app.jar

            nohup java -jar app.jar > backend.log 2>&1 &

            echo "Deploy frontend"
            rm -rf /var/www/html/*
            cp -r vue--cms/dist/* /var/www/html/

            echo "DONE"