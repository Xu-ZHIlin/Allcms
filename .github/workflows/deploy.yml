name: Deploy Admin & Client

on:
  push:
    branches: [ main ]

jobs:
  # 1. 管理端 (vue--cms) 构建与部署
  deploy-admin:
    runs-on: self-hosted
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Admin (vue--cms)
        run: |
          cd vue--cms
          npm install
          npm run build

      - name: Deploy Admin to /app/cms/web/admin
        run: |
          # 清空目标目录（防止旧文件残留导致 404 或样式错乱）
          sudo rm -rf /app/cms/web/admin/*
          # 将新构建的 dist 复制过去
          sudo cp -r vue--cms/dist/* /app/cms/web/admin/
          # 确保 Nginx 用户有读取权限
          sudo chmod -R 755 /app/cms/web/admin

  # 2. 客户端 (vue-dept7) 构建与部署
  deploy-client:
    runs-on: self-hosted
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Build Client (vue-dept7)
        run: |
          cd vue-dept7
          npm install
          npm run build

      - name: Deploy Client to /app/cms/web/client
        run: |
          sudo rm -rf /app/cms/web/client/*
          sudo cp -r vue-dept7/dist/* /app/cms/web/client/
          sudo chmod -R 755 /app/cms/web/client